<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f0ff">
    <meta name="description" content="Sam Quotes - Kaiju-Sized Wisdom. Get random quotes from Sam.">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%2312141c' width='192' height='192'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='%2300f0ff' text-anchor='middle' dominant-baseline='middle' font-family='Impact'>SQ</text></svg>">
    <title>Sam Quotes</title>
    <style>
        :root {
            --atomic-glow: #00f0ff;
            --atomic-dark: #008b9b;
            --bg-dark: #12141c;
            --stone-bg: #2e323d;
            --text-light: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
                linear-gradient(45deg, #161920 25%, #0f1115 25%, #0f1115 50%, #161920 50%, #161920 75%, #0f1115 75%, #0f1115 100%);
            background-size: 100% 100%, 100% 100%, 40px 40px;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(30, 34, 45, 0.85);
            padding: 40px 30px;
            border-radius: 28px;
            border: 3px solid #2d3546;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(0, 240, 255, 0.1);
            width: 100%;
            max-width: 430px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 140%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--atomic-glow), transparent);
            box-shadow: 0 0 12px var(--atomic-glow);
            opacity: 0.7;
        }
        .container::before { top: 0; left: -20%; transform: rotate(-1deg); }
        .container::after { bottom: 0; left: -20%; transform: rotate(1deg); }

        h1 {
            font-size: 3.2rem;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6), 2px 2px 0px #000;
            margin-bottom: 5px;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a889b;
            margin-bottom: 35px;
            font-weight: bold;
        }

        .quote-box {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            padding: 25px;
            border-radius: 16px;
            background: linear-gradient(135deg, #3a4151, #242936);
            border: 2px solid #4a5568;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
        }

        .quote-box::before, .quote-box::after {
            color: var(--atomic-glow);
            font-size: 3rem;
            position: absolute;
            opacity: 0.3;
            line-height: 1;
        }
        .quote-box::before { content: '"'; top: 5px; left: 15px; }
        .quote-box::after { content: '"'; bottom: -15px; right: 15px; }

        .quote-text {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.5;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            transition: all 0.15s ease-in-out;
        }

        .quote-text.changing {
            opacity: 0;
            transform: scale(0.95);
        }

        .btn {
            background: linear-gradient(180deg, #1f242e 0%, #11141a 100%);
            color: #ffffff;
            border: 3px solid var(--atomic-glow);
            padding: 16px 20px;
            font-size: 1.4rem;
            text-transform: uppercase;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(0, 240, 255, 0.2);
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            fill: var(--atomic-glow);
            filter: drop-shadow(0 0 4px var(--atomic-glow));
            transition: transform 0.2s;
        }

        .btn:hover {
            background: linear-gradient(180deg, #28303f 0%, #181d26 100%);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6), inset 0 0 15px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:hover .btn-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 34, 45, 0.95);
            border: 2px solid #00f0ff;
            border-radius: 12px;
            padding: 15px 20px;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .install-prompt.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .install-prompt button {
            background: #00f0ff;
            color: #12141c;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }

        .install-prompt button:hover {
            background: #00d9e8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sam Quotes</h1>
        <p class="subtitle">Kaiju-Sized Wisdom</p>
        
        <div class="quote-box">
            <p class="quote-text" id="quoteDisplay">Summon Sam's ancient wisdom...</p>
        </div>

        <button class="btn" id="quoteBtn">
            <svg class="btn-icon" viewBox="0 0 24 24">
                <path d="M12,2C10.5,5 8.5,7.5 6,9C7.5,10.5 8,13 7.5,16C9,14.5 11,14.5 12,15.5C13,14.5 15,14.5 16.5,16C16,13 16.5,10.5 18,9C15.5,7.5 13.5,5 12,2M4,13C3.5,15 2,16.5 1,17C2.5,17.5 4.5,17 5,16C4.5,15 4.5,14 4,13M20,13C19.5,14 19.5,15 20,16C20.5,17 22.5,17.5 24,17C23,16.5 21.5,15 21,13Z" />
            </svg>
            Give Me Wisdom
        </button>
    </div>

    <div class="install-prompt" id="installPrompt">
        <p>📱 Add Sam Quotes to your home screen!</p>
        <button id="installBtn">Install App</button>
    </div>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                    console.log('Service Worker registered:', registration);
                })
                .catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
        }

        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to install prompt: ${outcome}`);
                deferredPrompt = null;
                installPrompt.classList.remove('show');
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            installPrompt.classList.remove('show');
            deferredPrompt = null;
        });

        // Quote Functionality
        const samQuotes = [
            ""I value the dollar more than my friends"",
            ""I'm gay"",
            ""I'd smash"",
            ""Why don't you love me?"",
            ""I'm tired"",
            ""I'm playing Ark survival"",
            ""Want to skate?"",
            ""What's up squirrel brains?"",
            ""I like dick"",
            ""Luuky Pookie"",
            ""My wife has the biggest penis"",
            ""Can I put one in you?"",
            ""Where's my fleshlight?""
        ];

        const quoteDisplay = document.getElementById('quoteDisplay');
        const quoteBtn = document.getElementById('quoteBtn');
        
        let lastIndex = -1;

        function getRandomQuote() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * samQuotes.length);
            } while (randomIndex === lastIndex);
            
            lastIndex = randomIndex;
            return samQuotes[randomIndex];
        }

        quoteBtn.addEventListener('click', () => {
            quoteDisplay.classList.add('changing');
            
            setTimeout(() => {
                quoteDisplay.textContent = getRandomQuote();
                quoteDisplay.classList.remove('changing');
            }, 150);
        });
    </script>
</body>
</html>
